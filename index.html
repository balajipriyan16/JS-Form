<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Form</title>

    <style>
        @import url('https://googleapis.com');
        body{
            margin:0;
            padding:0;
            font-family: 'Poppins', sans-serif;
            background:#f1f4f9;
            display:flex;
            flex-direction:column;
            align-items:center;
            margin-top:65px;
        }

        h1{
            color:#ff8226;
            margin-bottom:20px;
            text-decoration-line: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        .container{
            width:350px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,.15);
            display:flex;
            flex-direction:column;
        }

        .container h2{
            font-size:18px;
            margin:15px 0 6px;
            color:#444;
        }

        .container input{
            padding:10px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
            transition:.3s;
        }

        .container input:focus{
            border-color:#007bff;
            box-shadow:0 0 5px rgba(0,123,255,.3);
        }

        .error{
            display:none;
            color:red;
            font-size:14px;
            margin:5px 0 0;
        }

        #btn{
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: #8f96ff;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.25);
        }

        #btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
            background: #ff8226;
        }

        #btn:active{
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.25);
        }

        #btn:disabled{
            background: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            opacity: 1;
        }

        .SuccessMSG{
            text-align: center;
            margin: 0;
            color: green;
            display: none;
        }
    </style>
</head>
<body>

    <h1>User Registration Form</h1>

    <div class="container">
        <p class="SuccessMSG">User Registration Successful !</p>
        <h2>Name</h2>
        <input type="text" id="NameInput" placeholder="Enter Name">
        <p class="error" id="nameError"></p>

        <h2>Email</h2>
        <input type="email" id="MailInput" placeholder="Enter Email">
        <p class="error" id="mailError"></p>

        <h2>Password</h2>
        <input type="password" id="PassInput" placeholder="Enter Password">
        <p class="error" id="passError"></p>

        <button id="btn">Submit</button>

    </div>

    <script>
        var Name = document.getElementById("NameInput");
        var Mail = document.getElementById("MailInput");
        var Password = document.getElementById("PassInput");
        var btn = document.getElementById("btn");

        var nameError = document.getElementById("nameError");
        var mailError = document.getElementById("mailError");
        var passError = document.getElementById("passError");
        var MSG = document.querySelector(".SuccessMSG")

        btn.addEventListener("click", function () {


            nameError.style.display = "none";
            mailError.style.display = "none";
            passError.style.display = "none";

            var isValid = true;


            if (Name.value.trim() === "") {
                nameError.style.display = "block";
                nameError.textContent = "Name cannot be empty";
                isValid = false;
            }

            if (Mail.value.trim() === "") {
                mailError.style.display = "block";
                mailError.textContent = "Email cannot be empty";
                isValid = false;
            }
            else if (!Mail.value.includes("@") || !Mail.value.includes(".")) {
                mailError.style.display = "block";
                mailError.textContent = "Enter a valid email address";
                isValid = false;
            }

            if (Password.value.trim() === "") {
                passError.style.display = "block";
                passError.textContent = "Password cannot be empty";
                isValid = false;
            }
            else if (Password.value.length < 6) {
                passError.style.display = "block";
                passError.textContent = "Password must be at least 6 characters";
                isValid = false;
            }


            if (isValid) {
                btn.disabled = true;
                btn.textContent = "Submitted";
                MSG.style.display = "block"
            }

        });
    </script>

</body>
</html>
